<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meu perfil - AdvogadoPro</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>

  <body>
    <header class="header">
      <div class="container" style="display: flex; justify-content: space-between; align-items: baseline; gap: 1rem;">
        <div>
          <h1>Meu perfil</h1>
          <p class="tagline">Atualize suas informações e carregue uma foto.</p>
        </div>
        <div style="display:flex; align-items:center; gap:1rem;">
          <a href="/app" class="card-action" style="padding: 0.5rem 1rem;">Voltar</a>
          <a href="/logout" class="card-action" style="padding: 0.5rem 1rem;">Sair</a>
        </div>
      </div>
    </header>

    <main class="container" style="padding: 2rem 0;">
      <section class="card" style="max-width: 600px; margin: 0 auto;">
        <div class="card-body">
          <form id="profileForm" enctype="multipart/form-data" style="display: grid; gap: 1rem;">
            <div style="display: flex; gap: 1rem; align-items: center;">
              <div id="photoPreview" style="width: 96px; height: 96px; border-radius: 16px; border: 1px solid var(--border); overflow: hidden; display: flex; align-items: center; justify-content: center; background: rgba(15, 23, 42, 0.04);">
                <span style="color: var(--muted); font-size: 0.85rem; text-align: center; padding: 0.5rem;">Sem foto</span>
              </div>
              <div style="flex: 1;">
                <label>
                  Foto de perfil
                  <input id="foto" name="foto" type="file" accept="image/*" />
                </label>
                <p class="card-info" style="margin: 0.5rem 0 0; font-size: 0.85rem;">Use JPG/PNG. Máximo 5MB.</p>
              </div>
            </div>

            <div class="form-row">
              <label>
                Nome completo
                <input id="nome" name="nome" type="text" required />
              </label>

              <label>
                E-mail
                <input id="email" name="email" type="email" readonly />
              </label>
            </div>

            <div class="form-row">
              <label>
                Telefone
                <input id="telefone" name="telefone" type="text" />
              </label>

              <label>
                Endereço
                <input id="endereco" name="endereco" type="text" />
              </label>
            </div>

            <div id="advogadoFields">
              <div class="form-row">
                <label>
                  Especialização
                  <input id="especializacao" name="especializacao" type="text" />
                </label>

                <label>
                  CEP
                  <input id="cep" name="cep" type="text" />
                </label>
              </div>

              <div class="form-row">
                <label>
                  Casos ganhos
                  <input id="casos_ganhos" name="casos_ganhos" type="number" min="0" />
                </label>
              </div>

              <label>
                Biografia
                <textarea id="biografia" name="biografia" rows="3"></textarea>
              </label>
            </div>

            <button class="card-action" type="submit">Salvar</button>

            <p id="status" class="card-info" style="display: none; margin: 0;"></p>
          </form>
        </div>
      </section>
    </main>

    <script>
      function qs(id) {
        return document.getElementById(id);
      }

      const status = qs('status');
      const fotoInput = qs('foto');
      const photoPreview = qs('photoPreview');
      const advogadoFields = qs('advogadoFields');

      function setStatus(message, isError = false) {
        status.textContent = message;
        status.style.display = 'block';
        status.style.color = isError ? '#b91c1c' : 'inherit';
      }

      function clearStatus() {
        status.style.display = 'none';
      }

      async function loadProfile() {
        try {
          const res = await fetch('/api/profile');
          if (!res.ok) throw new Error('Não autorizado');
          const json = await res.json();

          qs('nome').value = json.profile?.nome || '';
          qs('email').value = json.email || '';
          qs('telefone').value = json.profile?.telefone || '';
          qs('endereco').value = json.profile?.endereco || '';

          const isAdvogado = json.tipo === 'advogado';
          advogadoFields.style.display = isAdvogado ? 'block' : 'none';

          // Required fields depend on user type
          qs('telefone').required = true;
          qs('especializacao').required = isAdvogado;

          if (isAdvogado) {
            qs('especializacao').value = json.profile?.especializacao || '';
            qs('cep').value = json.profile?.cep || '';
            qs('casos_ganhos').value = json.profile?.casos_ganhos || '';
            qs('biografia').value = json.profile?.biografia || '';
          }

          if (json.foto) {
            photoPreview.innerHTML = `<img src="${json.foto}" alt="Foto de perfil" style="width:100%; height:100%; object-fit:cover;" />`;
          }
        } catch (err) {
          setStatus('Erro ao carregar perfil.', true);
          console.error(err);
        }
      }

      fotoInput.addEventListener('change', () => {
        const file = fotoInput.files[0];
        if (!file) return;
        const url = URL.createObjectURL(file);
        photoPreview.innerHTML = `<img src="${url}" alt="Foto de perfil" style="width:100%; height:100%; object-fit:cover;" />`;
      });

      qs('profileForm').addEventListener('submit', async (event) => {
        event.preventDefault();
        clearStatus();

        const nome = qs('nome').value.trim();
        const telefone = qs('telefone').value.trim();
        const especializacao = qs('especializacao').value.trim();
        const isAdvogado = advogadoFields.style.display !== 'none';

        if (!nome) {
          setStatus('Nome completo é obrigatório.', true);
          return;
        }
        if (!telefone) {
          setStatus('Telefone é obrigatório.', true);
          return;
        }
        if (isAdvogado && !especializacao) {
          setStatus('Especialização é obrigatória para advogados.', true);
          return;
        }

        const form = new FormData(qs('profileForm'));

        try {
          const res = await fetch('/api/profile', {
            method: 'POST',
            body: form,
          });
          if (!res.ok) throw new Error('Falha ao salvar.');
          setStatus('Perfil atualizado com sucesso!');
        } catch (err) {
          console.error(err);
          setStatus('Erro ao salvar perfil.', true);
        }
      });

      loadProfile();
    </script>
  </body>
</html>
